version: '3.9'
services:
   frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - '80:80'
    restart: unless-stopped

    
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    env_file:
      - ./Backend/.env
    ports:
      - '5000:5000'
    restart: unless-stopped
